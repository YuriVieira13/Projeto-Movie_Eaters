<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filme da semana</title>

    <link rel="stylesheet" href="styles/styleFilme.css" />
    <link rel="icon" href="assets/icons" />


</head>

<body>

    <div class="container1">

        <div class="header">

            <div class="left">
                Bem vindo, Yuri
            </div>

            <div class="center">
                <ul class="navbar">
                    <li class="ativo"><a href="">FILME DA SEMANA</a></li>
                    <li><a href="#sobreNos">RANKING</a></li>
                    <li><a href="../Public/login.html">HISTÓRICO</a></li>
                    <li><a href="../Public/cadastro.html">REVIEWS</a></li>
                </ul>
            </div>
        </div>

        <div class="diretor">
            <span>Mantenha segredo se quiser</span>
            <h1>VOCÊ É O DIRETOR DA SEMANA</h1>
        </div>

        <div class="cadastro">
            <div class="card-cadastro">
                <h2>Escolha o filme</h2>
                <div class="formulario">
                    <div class="campo">
                        <div class="linha-esquerda">
                            <span>Nome do filme:</span>
                        </div>
                        <input id="nome_input" type="text" placeholder="Avatar" />
                    </div>
                    <div class="campo">
                        <div class="linha-esquerda">
                            <span>Diretor:</span>
                        </div>
                        <input id="diretor_input" type="text" placeholder="James Cameron" />
                    </div>
                    <div class="campo">
                        <div class="linha-esquerda">
                            <span>Ano de Lançamento:</span>
                        </div>
                        <input id="ano_input" type="number" placeholder="2009" />
                    </div>
                    <div class="campo">
                        <div class="linha-esquerda">
                            <span>Onde assistir:</span>
                        </div>
                        <input id="onde_assistir_input" type="text" placeholder="Disney Plus" />
                    </div>
                    <button class="botao">DECIDIR</button>
                </div>
            </div>
        </div>

        <div class="rodape">“LEMBRE-SE: COM GRANDES PODERES VÊM GRANDES RESPONSABILIDADES.”</div>

    </div>
</body>

</html>
