<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="styles/styleLogin.css" />
    <link rel="icon" href="assets/icons" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />

</head>

<body>

    <div class="container1">

        <div class="header">

        <a href="../Public/home.html"> <img src="../Public/ASSETS/logonova.png" alt=""> </a>


        </div>

        <div class="cadastro">
            <div class="card-cadastro">
                <h2>Crie a sua conta</h2>
                <div class="formulario">
                <div class="campo">
                    <div class="linha-esquerda">
                    <span>Nome:</span>
                    </div>
                    <input id="nome_input" type="text" placeholder="Seu nome" />
                </div>
                <div class="campo">
                    <div class="linha-esquerda">
                    <span>E-mail:</span>
                    </div>
                    <input id="email_input" type="text" placeholder="meuemail@dominio.com" />
                </div>
                <div class="campo">
                      <div class="linha-esquerda">
                    <span>Senha:</span>
                    </div>
                    <input id="senha_input" type="password" placeholder="******" />
                </div>
                <div class="campo">
                       <div class="linha-esquerda">
                    <span>Confirmar Senha:</span>
                    </div>
                    <input id="confirmacao_senha_input" type="password" placeholder="******" />
                </div>
                <button class="botao">CADASTRAR</button>
            </div>
            <div class="mensagem"> Já possui uma conta? 
                <a href="../Public/login.html" class="link-login">Faça login!</a>
            </div>

        </div>

    </div>

</body>

</html>
