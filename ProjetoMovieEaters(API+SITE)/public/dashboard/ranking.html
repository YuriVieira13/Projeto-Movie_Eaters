<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="../js/validar.js"></script>
    <link rel="stylesheet" href="../css/styleRanking.css">
    <link rel="icon" href="/assets/logonova.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body onload="carregadorDados(), carregarGrafico()">

    <div class="container">

        <div class="header">

            <div class="left">
                Bem vindo, Yuri
            </div>

            <div class="center">
                <ul class="navbar">
                    <li>
                        <a href="#" onclick="conferir()">FILME DA SEMANA</a>
                    </li>
                    <li class="ativo"><a href="">RANKING</a></li>
                    <li><a href="">HISTÓRICO</a></li>
                    <li><a href="./review.html">REVIEWS</a></li>
                    <li class="direita"><a href="#" onclick="sair()">SAIR</a></li>
                </ul>
            </div>
        </div>

        <div class="kpis">

            <div class="indicativo">
                <span class="titulo">Posição:</span>
                <span class="valor" id="posicao">1</span>
            </div>

            <div class="indicativo">
                <span class="titulo">Pontuação:</span>
                <span class="valor" id="total">78 Pontos</span>
            </div>

            <div class="indicativo">
                <span class="titulo">Líder atual:</span>
                <span class="valor" id="lider">Yuri</span>
            </div>

            <div class="indicativo">
                <span class="titulo">Distância do 1º:</span>
                <span class="valor" id="distancia">0 Pontos</span>
            </div>

        </div>

        <div class="graficos">
            <div class="grafico1"> <canvas class="graficoEvolucao" id="graficoEvolucao"></canvas> </div>
            <div class="grafico2"> </div><canvas class="graficoRanking" id="graficoRanking"></canvas>
        </div>
    </div>

    </div>

</body>

</html>


<script>

    let posicao = 1;
    let index = 0;

    function carregadorDados() {
        var nomeUsuario = sessionStorage.getItem("NOME_USUARIO");

        fetch("/pontuacao/listar")
            .then(res => res.json())
            .then(dados => {

                console.log(dados);

                for (let i = 0; i < dados.length; i++) {

                    if (dados[i].nome == nomeUsuario) {
                        index = i;
                        posicao = index + 1;
                    }

                }

                document.getElementById("posicao").innerText = posicao;
                document.getElementById("total").innerText = dados[index].total;
                document.getElementById("lider").innerText = dados[0].nome.toUpperCase();
                document.getElementById("distancia").innerText = (dados[0].total - dados[index].total) + ' pontos';
                document.querySelector(".left").innerText = "Bem vindo, " + nomeUsuario;


                const grafico2 = document.getElementById('graficoRanking');

                new Chart(grafico2, { // Cria um novo gráfico usando o canvas 'grafico2'

                    type: 'bar', //

                    data: {
                        labels: [dados[0].nome, dados[1].nome, dados[2].nome, dados[3].nome], // eixo y

                        datasets: [{
                            label: 'Pontuação', // eixo x

                            data: [dados[0].total, dados[1].total, dados[2].total, dados[3].total], // Valores correspondentes a cada nome

                            backgroundColor: '#2c6794',

                            borderRadius: 20,

                            barThickness: 35 // Define a altura das barras
                        }]
                    },

                    options: {
                        indexAxis: 'y', // Faz o gráfico ficar horizontal (eixo principal vira o Y)

                        responsive: true, // Faz o gráfico se adaptar ao tamanho da tela/container

                        plugins: {
                            legend: {
                                display: false // Esconde a legenda (já que só tem um dataset)
                            },

                            title: {
                                display: true, // Mostra o título
                                text: 'Ranking geral da competição', // Texto do título
                                color: '#ffffff', // Cor do título
                                font: {
                                    size: 20 // Tamanho da fonte do título
                                }
                            },

                            tooltip: {
                                enabled: true // Ativa o tooltip ao passar o mouse nas barras
                            }
                        },

                        scales: {
                            x: {
                                beginAtZero: true, // Começa o eixo X no zero

                                ticks: {
                                    color: '#ccc', // Cor dos números do eixo X
                                },

                                grid: {
                                    color: 'rgba(255,255,255,0.1)' // Cor das linhas de fundo (grade)
                                },

                                title: {
                                    display: true, // Mostra o título do eixo X
                                    text: 'Pontuação', // Texto do eixo
                                    color: '#ccc' // Cor do texto
                                }
                            },

                            y: {
                                ticks: {
                                    color: '#ccc' // Cor dos nomes (Yuri, Ana, etc.)
                                },

                                grid: {
                                    display: false // Remove as linhas de grade horizontais
                                }
                            }
                        }
                    }
                });



            })
            .catch(erro => {
                console.log("Erro:", erro);
            });

    }


    function carregarGrafico() {

        let play1 = []
        let play2 = []
        let play3 = []
        let play4 = []
        let semanas = []
        let layout = ["semana 1", "semana 2", "semana 3", "semana 4"]

        fetch("/ranking/listar")
            .then(res => res.json())
            .then(dados => {

            console.log(dados)

        let nome1 = dados[0].nome;
        let nome2 = dados[1].nome;
        let nome3 = dados[2].nome;
        let nome4 = dados[3].nome;
        let qntSemanas = dados[0].qtdSemanas;

        // automatizar o número de semanas no gráfico
          for (let i = 1; i <= qntSemanas; i++) {
            semanas.push("Semana " + i)

            if (i > 4) {layout = semanas}
        
        } 

         // lógica para definir a pontuação por semana

          for (let i = 0; i < dados.length; i++) {

                    if (dados[i].nome == nome1) {
                        let posicao = i % 4 + 1;
                        play1.push(posicao)
                    } else if (dados[i].nome == nome2) {
                        let posicao = i % 4 + 1;
                        play2.push(posicao)
                }  else if (dados[i].nome == nome3) {
                        let posicao = i % 4 + 1;
                        play3.push(posicao)
                } else {
                        let posicao = i % 4 + 1;
                        play4.push(posicao)
            }
          }


                // construção do gráfico 1
                const grafico1 = document.getElementById('graficoEvolucao');

                new Chart(grafico1, {
                    type: 'line',
                    data: {
                        labels: layout, // eixo x
                        datasets: [
                            {
                                label: nome1,
                                data: play1,
                                borderColor: "#4A90E2", // cor individual
                                backgroundColor: "#4A90E2",
                                borderWidth: 3, // grossura da linha
                                tension: 0.3 // curva leve
                            },
                            {
                                label: nome2,
                                data: play2,
                                borderColor: "#B084F5",
                                backgroundColor: "#B084F5",
                                borderWidth: 3,
                                tension: 0.3
                            },
                            {
                                label: nome3,
                                data: play3,
                                borderColor: "#F5A623",
                                backgroundColor: "#F5A623",
                                borderWidth: 3,
                                tension: 0.3
                            },
                            {
                                label: nome4,
                                data: play4,
                                borderColor: "#F8E71C",
                                backgroundColor: "#F8E71C",
                                borderWidth: 3,
                                tension: 0.3
                            }
                        ]
                    },
                    options:

                    {
                        plugins: {
                            legend: {
                                position: "bottom"
                            },

                            title: {
                                display: true, // Mostra o título
                                text: 'Classificação Semanal (Quem fez mais pontos naquela semana)', // Texto do título
                                color: '#ffffff', // Cor do título
                                font: {
                                    size: 20 // Tamanho da fonte do título
                                }
                            },

                            tooltip: {
                                enabled: true // Ativa o tooltip ao passar o mouse nas barras
                            }
                        },
                        scales: {
                            y: {
                                reverse: true,
                                min: 0,
                                max: 5,
                                ticks: {
                                    stepSize: 1,
                                    callback: function (value) {
                                        if (value == 0 || value == 5) {
                                            return "";
                                        }
                                        return value + "º";
                                    }
                                }
                            }
                        }
                    }

                }
                );


            })
            .catch(erro => {
                console.log("Erro:", erro);
            });



    }



</script>
